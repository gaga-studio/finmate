name: Contract Check

on:
  push:
  pull_request:

jobs:
  validate-contract:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Validate FinMate P0 contract
        run: python3 scripts/validate_contract.py

      - name: Test Spring Boot mock API
        run: ./gradlew :apps:api:test
