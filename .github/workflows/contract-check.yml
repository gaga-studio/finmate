name: Contract Check

on:
  push:
  pull_request:

jobs:
  validate-contract:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
          npm ci --prefix apps/web

      - name: Validate legacy P0 contract archive
        run: python3 tools/scripts/validate_contract.py

      - name: Validate current app contract
        run: python3 tools/scripts/validate_app_contract.py

      - name: Validate product MVP baseline
        run: python3 tools/scripts/validate_product_mvp.py

      - name: Validate synthetic importer
        run: python3 tools/scripts/validate_synthetic_import.py

      - name: Test Spring Boot API
        run: ./gradlew :apps:api:test

      - name: Build Vite web app
        run: npm run build --prefix apps/web
