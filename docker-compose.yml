services:
  postgres:
    image: postgres:16-alpine
    container_name: finmate-postgres
    environment:
      POSTGRES_DB: finmate
      POSTGRES_USER: finmate
      POSTGRES_PASSWORD: finmate
    ports:
      - "5432:5432"
    volumes:
      - finmate-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finmate -d finmate"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: finmate-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FINMATE_DB_URL: jdbc:postgresql://postgres:5432/finmate
      FINMATE_DB_USERNAME: finmate
      FINMATE_DB_PASSWORD: finmate
      FINMATE_DEV_TOOLS_ENABLED: "true"
      FINMATE_JWT_SECRET: local-docker-development-secret-change-before-production-32bytes
      FINMATE_SEED_DIR: /app/seed
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: finmate-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  finmate-postgres-data:
