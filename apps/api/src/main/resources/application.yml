spring:
  datasource:
    url: ${FINMATE_DB_URL:jdbc:postgresql://localhost:5432/finmate}
    username: ${FINMATE_DB_USERNAME:finmate}
    password: ${FINMATE_DB_PASSWORD:finmate}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

finmate:
  auth:
    issuer: finmate-local
    access-token-minutes: 30
    refresh-token-days: 14
    jwt-secret: ${FINMATE_JWT_SECRET:local-development-secret-change-before-production-32bytes}
